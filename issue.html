<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이슈관리 — 러너로지스</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg:       #f0f4f9;
  --surface:  #ffffff;
  --surface2: #e8eef6;
  --border:   #d0dae8;
  --border2:  #b8c6dc;
  --text:     #1e293b;
  --text2:    #475569;
  --text3:    #94a3b8;
  --text4:    #cbd5e1;

  --accent:   #2563eb;
  --acc-soft: rgba(37,99,235,.09);
  --acc-bd:   rgba(37,99,235,.3);

  --orange:   #ea580c;
  --os:       rgba(234,88,12,.09);

  --today-bg: rgba(37,99,235,.08);
  --today-bd: rgba(37,99,235,.4);

  --shadow:   0 1px 4px rgba(0,0,0,.07);
  --shadow2:  0 4px 16px rgba(0,0,0,.1);
  --radius:   12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Sans KR", sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════
   헤더
══════════════════════ */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
  position: sticky; top: 0; z-index: 100;
  padding: 0 20px;
}
.header-inner {
  max-width: 860px; margin: 0 auto;
  display: flex; align-items: center;
  height: 54px; gap: 12px;
}
.logo {
  display: flex; align-items: center; gap: 9px;
}
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, #f59e0b, #ea580c);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(245,158,11,.3);
}
.logo-text { font-size: 15px; font-weight: 900; letter-spacing: -.3px; color: var(--text); }
.logo-sub  { font-size: 10px; color: var(--text3); font-family: "JetBrains Mono", monospace; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.today-chip {
  background: var(--acc-soft); border: 1px solid var(--acc-bd);
  border-radius: 20px; padding: 4px 12px;
  font-size: 11px; color: var(--accent);
  font-family: "JetBrains Mono", monospace; white-space: nowrap; font-weight: 600;
}
.refresh-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 11px;
  color: var(--text2); font-size: 14px; cursor: pointer;
  transition: all .15s; font-weight: 700;
}
.refresh-btn:hover { background: var(--border); color: var(--text); }

/* ══════════════════════
   본문
══════════════════════ */
.main {
  max-width: 860px; margin: 0 auto;
  padding: 22px 16px 72px;
}

/* ══════════════════════
   컨트롤 바
══════════════════════ */
.ctrl-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px; flex-wrap: wrap;
}

/* 기간 탭 */
.period-tabs {
  display: flex; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 3px; gap: 2px;
}
.ptab {
  padding: 6px 14px; border-radius: 7px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; border: none; background: none;
  color: var(--text2); font-family: "Noto Sans KR", sans-serif;
  transition: all .15s; white-space: nowrap;
}
.ptab:hover { color: var(--text); }
.ptab.active {
  background: var(--accent); color: #fff;
  box-shadow: 0 2px 6px rgba(37,99,235,.35);
}

/* 주 네비 */
.week-nav-wrap {
  display: flex; align-items: center; gap: 6px;
}
.wnav-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 11px;
  color: var(--text2); font-size: 13px; cursor: pointer;
  transition: all .15s; font-weight: 700;
}
.wnav-btn:hover { background: var(--surface2); color: var(--accent); border-color: var(--acc-bd); }
.week-range-txt {
  font-size: 11px; color: var(--text);
  font-family: "JetBrains Mono", monospace; font-weight: 600;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 14px; white-space: nowrap;
  min-width: 156px; text-align: center;
}

/* ══════════════════════
   KPI
══════════════════════ */
.kpi-bar {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 18px;
}
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  box-shadow: var(--shadow); transition: border-color .15s;
}
.kpi-card:hover { border-color: var(--border2); }
.kpi-label {
  font-size: 10px; color: var(--text2); font-weight: 700;
  letter-spacing: .5px; text-transform: uppercase; margin-bottom: 5px;
}
.kpi-val {
  font-size: 26px; font-weight: 900;
  font-family: "JetBrains Mono", monospace; line-height: 1;
  color: var(--text);
}
.kpi-card.k-all  .kpi-val { color: var(--text); }
.kpi-card.k-week .kpi-val { color: var(--accent); }
.kpi-card.k-today .kpi-val { color: var(--orange); }

/* ══════════════════════
   날짜 그룹
══════════════════════ */
.date-group { margin-bottom: 12px; }

.dg-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 9px; margin-bottom: 6px;
  background: var(--surface2); border-left: 3px solid var(--border2);
  position: sticky; top: 55px; z-index: 10;
}
.dg-header.is-today {
  background: var(--today-bg);
  border-left-color: var(--accent);
  box-shadow: 0 0 0 1px var(--today-bd);
}
.dg-date {
  font-size: 13px; font-weight: 700;
  font-family: "JetBrains Mono", monospace; color: var(--text);
}
.dg-dow { font-size: 11px; color: var(--text2); }
.sun-txt { color: #ef4444; } .sat-txt { color: #3b82f6; }
.dg-today-badge {
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 2px 9px; border-radius: 10px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(37,99,235,.4); }
  50%      { box-shadow: 0 0 0 5px rgba(37,99,235,0); }
}
.dg-cnt {
  margin-left: auto; font-size: 10px; color: var(--text3);
  font-family: "JetBrains Mono", monospace;
}

/* ══════════════════════
   이슈 카드
══════════════════════ */
.issue-card {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius); padding: 13px 16px;
  margin-bottom: 6px; box-shadow: var(--shadow);
  transition: border-color .15s, box-shadow .15s;
  animation: fadeIn .18s ease both;
}
.issue-card:hover {
  border-color: var(--acc-bd);
  box-shadow: var(--shadow2);
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

.issue-inner { display: flex; align-items: flex-start; gap: 10px; }

.issue-type-badge {
  flex-shrink: 0; margin-top: 2px;
  padding: 3px 10px; border-radius: 8px;
  font-size: 10px; font-weight: 700; white-space: nowrap;
  background: var(--acc-soft); color: var(--accent);
  border: 1px solid var(--acc-bd);
}
.issue-content {
  flex: 1; font-size: 13px; color: var(--text);
  line-height: 1.7; word-break: keep-all; white-space: pre-line;
}

/* ══════════════════════
   빈 / 에러 / 로딩
══════════════════════ */
.state-box {
  text-align: center; padding: 72px 20px;
}
.state-icon { font-size: 44px; display: block; margin-bottom: 14px; opacity: .4; }
.state-title { font-size: 15px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.state-sub { font-size: 12px; color: var(--text3); line-height: 1.9; }
.retry-btn {
  margin-top: 14px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px; padding: 8px 22px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: "Noto Sans KR", sans-serif; transition: opacity .15s;
}
.retry-btn:hover { opacity: .85; }
.loading-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 72px 20px; gap: 14px;
}
.loader {
  width: 34px; height: 34px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 13px; color: var(--text2); }

/* ══════════════════════
   오늘 이슈 팝업
══════════════════════ */
#today-popup {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.55);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: bgIn .2s ease;
}
@keyframes bgIn { from { opacity: 0; } to { opacity: 1; } }

.popup-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  width: 100%; max-width: 460px; max-height: 84vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
  overflow: hidden;
  animation: popUp .26s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popUp { from { opacity: 0; transform: translateY(20px) scale(.97); } to { opacity: 1; transform: none; } }

.popup-head {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, var(--os), var(--acc-soft));
  flex-shrink: 0;
}
.popup-head-top {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;
}
.popup-title {
  font-size: 15px; font-weight: 900;
  display: flex; align-items: center; gap: 8px; color: var(--text);
}
.popup-title-icon {
  width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
  background: linear-gradient(135deg, #f59e0b, #ea580c);
  display: flex; align-items: center; justify-content: center; font-size: 15px;
}
.popup-close {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 4px 11px;
  font-size: 15px; cursor: pointer; color: var(--text2); transition: all .15s;
}
.popup-close:hover { background: var(--border); color: var(--text); }
.popup-date { font-size: 11px; color: var(--text2); font-family: "JetBrains Mono", monospace; }

.popup-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
.popup-item {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 10px; padding: 11px 13px; margin-bottom: 8px;
}
.popup-item:last-child { margin-bottom: 0; }
.popup-item-badge {
  flex-shrink: 0; padding: 2px 9px; border-radius: 7px;
  font-size: 10px; font-weight: 700; margin-top: 2px; white-space: nowrap;
  background: var(--acc-soft); color: var(--accent); border: 1px solid var(--acc-bd);
}
.popup-item-content {
  flex: 1; font-size: 13px; color: var(--text);
  line-height: 1.7; word-break: keep-all; white-space: pre-line;
}

.popup-foot {
  padding: 12px 18px 16px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.no-more-label {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: var(--text2); cursor: pointer; user-select: none;
}
.no-more-label input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
.popup-confirm {
  background: var(--accent); color: #fff; border: none; border-radius: 9px;
  padding: 8px 22px; font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: "Noto Sans KR", sans-serif; transition: opacity .15s;
}
.popup-confirm:hover { opacity: .85; }

/* ══════════════════════
   반응형
══════════════════════ */
@media (max-width: 560px) {
  .kpi-bar { grid-template-columns: repeat(3, 1fr); }
  .ctrl-bar { gap: 7px; }
  .logo-sub { display: none; }
  .week-range-txt { min-width: 120px; font-size: 10px; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <div>
        <div class="logo-text">이슈관리</div>
        <div class="logo-sub">RUNNER LOGIS</div>
      </div>
    </div>
    <div class="header-right">
      <div class="today-chip" id="hd-today">—</div>
      <button class="refresh-btn" onclick="reload()" title="새로고침">↺</button>
    </div>
  </div>
</header>

<!-- 본문 -->
<main class="main">

  <!-- 컨트롤 바 -->
  <div class="ctrl-bar">
    <div class="period-tabs">
      <button class="ptab active" data-mode="month" onclick="setMode(this,'month')">이번달</button>
      <button class="ptab"        data-mode="week"  onclick="setMode(this,'week')">주 검색</button>
    </div>
    <div class="week-nav-wrap" id="week-nav" style="display:none">
      <button class="wnav-btn" onclick="moveWeek(-1)">◀</button>
      <div class="week-range-txt" id="week-range-txt">—</div>
      <button class="wnav-btn" onclick="moveWeek(1)">▶</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi-bar">
    <div class="kpi-card k-all">
      <div class="kpi-label">기간 전체</div>
      <div class="kpi-val" id="kpi-all">—</div>
    </div>
    <div class="kpi-card k-week">
      <div class="kpi-label">이번주</div>
      <div class="kpi-val" id="kpi-week">—</div>
    </div>
    <div class="kpi-card k-today">
      <div class="kpi-label">오늘</div>
      <div class="kpi-val" id="kpi-today">—</div>
    </div>
  </div>

  <!-- 이슈 목록 -->
  <div id="issue-area">
    <div class="loading-wrap">
      <div class="loader"></div>
      <div class="loading-txt">이슈 데이터 불러오는 중…</div>
    </div>
  </div>

</main>

<!-- 오늘 이슈 팝업 -->
<div id="today-popup" style="display:none">
  <div class="popup-box">
    <div class="popup-head">
      <div class="popup-head-top">
        <div class="popup-title">
          <div class="popup-title-icon">📢</div>
          오늘의 이슈
        </div>
        <button class="popup-close" onclick="closePopup()">✕</button>
      </div>
      <div class="popup-date" id="popup-date">—</div>
    </div>
    <div class="popup-body" id="popup-body"></div>
    <div class="popup-foot">
      <label class="no-more-label">
        <input type="checkbox" id="dismiss-cb"> 오늘은 그만 보기
      </label>
      <button class="popup-confirm" onclick="closePopup()">확인</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════
   설정
════════════════════════ */
var API_BASE    = "https://script.google.com/macros/s/AKfycbz6PQIGfl2l_P7KSBKQkuPLLPoHt-tLx-ZwcPlYUxNQj39oROys5MW4tObDrNhSQhew/exec";
var DISMISS_KEY = "issuePopupDismiss_v2";
var _jsonpTimer = null;

/* ════════════════════════
   상태
════════════════════════ */
var ALL_ISSUES = [];
var TODAY      = "";
var MODE       = "month";
var WEEK_OFFSET = 0;
var KD = ["일","월","화","수","목","금","토"];

/* ════════════════════════
   초기화
════════════════════════ */
window.addEventListener("DOMContentLoaded", function() {
  var now = new Date(); now.setDate(now.getDate() + 1);
  TODAY = toDS(now);
  document.getElementById("hd-today").textContent = fmtKor(TODAY);
  fetchIssues();
  renderWeekRange();
});

/* ════════════════════════
   유틸
════════════════════════ */
function toDS(d) {
  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,"0") + "-" +
    String(d.getDate()).padStart(2,"0");
}
function addD(s, n) {
  var d = new Date(s+"T00:00:00"); d.setDate(d.getDate()+n); return toDS(d);
}
function fmtFull(s) {
  var d = new Date(s+"T00:00:00");
  return d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0");
}
function fmtKor(s) {
  var d = new Date(s+"T00:00:00");
  return (d.getMonth()+1)+"월 "+d.getDate()+"일 ("+KD[d.getDay()]+")";
}
function fmtShort(s) {
  var d = new Date(s+"T00:00:00");
  return (d.getMonth()+1)+"/"+d.getDate();
}
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function getWeekRange(offset) {
  var td = new Date(TODAY+"T00:00:00");
  var sun = new Date(td);
  sun.setDate(td.getDate() - td.getDay() + offset * 7);
  var sat = new Date(sun); sat.setDate(sun.getDate()+6);
  return { start: toDS(sun), end: toDS(sat) };
}

/* ════════════════════════
   API 호출 — JSONP 전용
   Apps Script는 CORS를 지원하지 않으므로
   script 태그 방식(JSONP)으로만 호출
════════════════════════ */
function fetchIssues() {
  setArea('<div class="loading-wrap"><div class="loader"></div><div class="loading-txt">이슈 데이터 불러오는 중…</div></div>');

  // 이전 타이머 정리
  if (_jsonpTimer) { clearTimeout(_jsonpTimer); _jsonpTimer = null; }

  // 기존 JSONP 스크립트 태그 제거
  var old = document.getElementById("_jsonp_script");
  if (old && old.parentNode) old.parentNode.removeChild(old);

  var cbName = "_issuesCb";

  // 전역 콜백 등록
  window[cbName] = function(data) {
    if (_jsonpTimer) { clearTimeout(_jsonpTimer); _jsonpTimer = null; }
    var s = document.getElementById("_jsonp_script");
    if (s && s.parentNode) s.parentNode.removeChild(s);
    delete window[cbName];

    if (data && data.ok && Array.isArray(data.issues)) {
      ALL_ISSUES = data.issues;
      renderAll();
      checkTodayPopup();
    } else {
      showError((data && data.error) || "데이터를 불러올 수 없습니다.");
    }
  };

  // script 태그 생성
  var script = document.createElement("script");
  script.id  = "_jsonp_script";
  script.src = API_BASE + "?callback=" + cbName;
  script.onerror = function() {
    if (_jsonpTimer) { clearTimeout(_jsonpTimer); _jsonpTimer = null; }
    if (script.parentNode) script.parentNode.removeChild(script);
    delete window[cbName];
    showError("네트워크 오류가 발생했습니다.<br>인터넷 연결을 확인하거나 잠시 후 다시 시도해주세요.");
  };

  // 30초 타임아웃
  _jsonpTimer = setTimeout(function() {
    var s = document.getElementById("_jsonp_script");
    if (s && s.parentNode) s.parentNode.removeChild(s);
    delete window[cbName];
    showError("요청 시간이 초과됐습니다. 다시 시도해주세요.");
  }, 30000);

  document.head.appendChild(script);
}

function reload() { WEEK_OFFSET = 0; fetchIssues(); }

/* ════════════════════════
   컨트롤
════════════════════════ */
function setMode(btn, mode) {
  MODE = mode;
  document.querySelectorAll(".ptab").forEach(function(b) { b.classList.toggle("active", b===btn); });
  document.getElementById("week-nav").style.display = mode==="week" ? "flex" : "none";
  if (mode==="week") { WEEK_OFFSET=0; renderWeekRange(); }
  renderAll();
}

function moveWeek(dir) {
  WEEK_OFFSET += dir;
  renderWeekRange();
  renderAll();
}

function renderWeekRange() {
  var r = getWeekRange(WEEK_OFFSET);
  document.getElementById("week-range-txt").textContent = fmtShort(r.start) + " ~ " + fmtShort(r.end);
}

/* ════════════════════════
   필터링
════════════════════════ */
function getFiltered() {
  var issues = ALL_ISSUES.slice(); // 전체 (타입 필터 없음)

  if (MODE === "month") {
    var ym = TODAY.slice(0,7);
    issues = issues.filter(function(i) { return i.date.slice(0,7) === ym; });
  } else {
    var r = getWeekRange(WEEK_OFFSET);
    issues = issues.filter(function(i) { return i.date >= r.start && i.date <= r.end; });
  }

  return issues;
}

/* ════════════════════════
   렌더링
════════════════════════ */
function renderAll() {
  var filtered = getFiltered();

  // KPI 업데이트
  var thisWeekR = getWeekRange(0);
  document.getElementById("kpi-all").textContent   = filtered.length;
  document.getElementById("kpi-week").textContent  = ALL_ISSUES.filter(function(i){ return i.date>=thisWeekR.start&&i.date<=thisWeekR.end; }).length;
  document.getElementById("kpi-today").textContent = ALL_ISSUES.filter(function(i){ return i.date===TODAY; }).length;

  if (!filtered.length) {
    var msg = MODE==="month" ? "이번달 등록된 이슈가 없습니다." : "해당 주의 이슈가 없습니다.";
    setArea('<div class="state-box"><span class="state-icon">📭</span>'+
      '<div class="state-title">'+msg+'</div>'+
      '<div class="state-sub">백업 시트 비고1/2/3 행에<br>내용을 입력하면 표시됩니다.</div></div>');
    return;
  }

  // 날짜별 그룹 (내림차순)
  var groups = {};
  filtered.forEach(function(i) {
    if (!groups[i.date]) groups[i.date] = [];
    groups[i.date].push(i);
  });
  var dates = Object.keys(groups).sort(function(a,b) { return b.localeCompare(a); });

  var html = "";
  dates.forEach(function(date, idx) {
    var isToday = (date === TODAY);
    var d       = new Date(date+"T00:00:00");
    var dow     = d.getDay();
    var dowStr  = KD[dow];
    var dowCls  = dow===0 ? "sun-txt" : dow===6 ? "sat-txt" : "";
    var items   = groups[date];

    html += "<div class='date-group'>" +
      "<div class='dg-header"+(isToday?" is-today":"")+"'>" +
        "<span class='dg-date'>"+date+"</span>" +
        "<span class='dg-dow "+dowCls+"'>"+dowStr+"요일</span>" +
        (isToday ? "<span class='dg-today-badge'>오늘</span>" : "") +
        "<span class='dg-cnt'>"+items.length+"건</span>" +
      "</div>";

    items.forEach(function(iss, i2) {
      var delay = ((idx*3+i2)*0.03).toFixed(2);
      html += "<div class='issue-card' style='animation-delay:"+delay+"s'>" +
        "<div class='issue-inner'>" +
          "<span class='issue-type-badge'>"+esc(iss.type)+"</span>" +
          "<div class='issue-content'>"+esc(iss.content)+"</div>" +
        "</div>" +
      "</div>";
    });

    html += "</div>";
  });

  setArea(html);
}

function setArea(html) { document.getElementById("issue-area").innerHTML = html; }

function showError(msg) {
  setArea('<div class="state-box"><span class="state-icon">⚠️</span>'+
    '<div class="state-title">데이터를 불러오지 못했습니다</div>'+
    '<div class="state-sub">'+msg+'<br><br>'+
    '<button class="retry-btn" onclick="reload()">다시 시도</button>'+
    '</div></div>');
}

/* ════════════════════════
   오늘 이슈 팝업
════════════════════════ */
function checkTodayPopup() {
  var todayIssues = ALL_ISSUES.filter(function(i) { return i.date===TODAY; });
  if (!todayIssues.length) return;
  try { if (localStorage.getItem(DISMISS_KEY)===TODAY) return; } catch(e) {}
  showPopup(todayIssues);
}

function showPopup(issues) {
  document.getElementById("popup-date").textContent = fmtKor(TODAY);
  document.getElementById("dismiss-cb").checked = false;

  var html = issues.map(function(iss) {
    return "<div class='popup-item'>" +
      "<span class='popup-item-badge'>"+esc(iss.type)+"</span>" +
      "<div class='popup-item-content'>"+esc(iss.content)+"</div>" +
    "</div>";
  }).join("");

  document.getElementById("popup-body").innerHTML = html;
  document.getElementById("today-popup").style.display = "flex";
}

function closePopup() {
  var cb = document.getElementById("dismiss-cb");
  if (cb && cb.checked) {
    try { localStorage.setItem(DISMISS_KEY, TODAY); } catch(e) {}
  }
  document.getElementById("today-popup").style.display = "none";
}

document.getElementById("today-popup").addEventListener("click", function(e) {
  if (e.target === this) closePopup();
});
</script>
